<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rick & Morty Universe</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Get+Schwifty&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-rick">RICK</span>
        <span class="logo-amp">&</span>
        <span class="logo-morty">MORTY</span>
        <span class="logo-sub">Universe</span>
      </div>
      <p class="tagline">Wubba Lubba Dub Dub! Explore todos os personagens do multiverso.</p>
    </div>
    <div class="portal-ring ring1"></div>
    <div class="portal-ring ring2"></div>
    <div class="portal-ring ring3"></div>
  </header>

  <!-- FILTROS -->
  <section class="filters">
    <div class="filters-inner">
      <input type="text" id="search" placeholder="🔍 Buscar personagem..." />
      <select id="status-filter">
        <option value="">Todos os Status</option>
        <option value="alive">Vivo</option>
        <option value="dead">Morto</option>
        <option value="unknown">Desconhecido</option>
      </select>
      <select id="species-filter">
        <option value="">Todas as Espécies</option>
        <option value="human">Humano</option>
        <option value="alien">Alien</option>
        <option value="robot">Robô</option>
        <option value="mythological creature">Criatura Mitológica</option>
      </select>
    </div>
  </section>

  <!-- CONTADOR -->
  <div class="info-bar">
    <span id="count-display">Carregando personagens...</span>
  </div>

  <!-- GRID DE CARDS -->
  <main id="cards-container"></main>

  <!-- LOADING -->
  <div id="loading" class="loading">
    <div class="portal-loader">
      <div class="pl-inner"></div>
    </div>
    <p>Abrindo portal interdimensional...</p>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <button id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- SCROLL TO TOP -->
  <button id="scroll-top" title="Voltar ao topo">↑</button>

  <footer>
    <p>Feito com 💚 usando a <a href="https://rickandmortyapi.com/" target="_blank">Rick and Morty API</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
